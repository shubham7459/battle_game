<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BATTLE ARENA — PIXEL DUEL</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

body {
  background: #03030c;
  background-image: radial-gradient(ellipse at 30% 40%, rgba(68,136,255,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 85% 70%, rgba(139,0,0,0.08) 0%, transparent 60%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Courier New', 'VT323', monospace;
  padding: 16px;
}

.game-container {
  max-width: 1200px;
  width: 100%;
  background: rgba(6,6,15,0.65);
  backdrop-filter: blur(2px);
  border-radius: 28px;
  padding: 16px 20px 24px;
  border: 1px solid rgba(201,168,76,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 14px;
}
.arena-title {
  font-size: 1.9rem;
  font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #e4c47a, #c9a84c);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 6px rgba(0,0,0,0.5);
}
.sub {
  font-size: 0.7rem;
  color: #7a7568;
  letter-spacing: 2px;
  font-family: monospace;
}

/* fighter select */
.select-row {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  margin: 12px 0 18px;
}
.select-panel {
  background: #0a0a18cc;
  backdrop-filter: blur(4px);
  border: 1px solid #2a2a3e;
  border-radius: 28px;
  padding: 10px 18px;
  min-width: 240px;
}
.select-label {
  font-size: 0.7rem;
  letter-spacing: 3px;
  color: #aa9f82;
  margin-bottom: 6px;
  text-align: center;
}
.btn-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.fighter-btn {
  background: #11111f;
  border: 1px solid #3a3a4a;
  color: #b9ae8c;
  font-family: monospace;
  font-weight: bold;
  font-size: 0.7rem;
  padding: 5px 12px;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.15s;
}
.fighter-btn.active-p1 {
  border-color: #4488ff;
  color: #88aaff;
  background: #142044;
  box-shadow: 0 0 6px #4488ff66;
}
.fighter-btn.active-p2 {
  border-color: #dd4422;
  color: #ff8866;
  background: #441a0a;
  box-shadow: 0 0 6px #dd442266;
}

/* battle canvas (4x pixel density) */
.canvas-wrapper {
  display: flex;
  justify-content: center;
  margin: 12px 0 8px;
}
#battleCanvas {
  image-rendering: crisp-edges;
  image-rendering: pixelated;
  image-rendering: pixelated;
  background: #050510;
  border-radius: 16px;
  box-shadow: 0 0 0 2px #2a2a3a, 0 12px 28px black;
  width: 100%;
  height: auto;
  max-width: 880px;
  border: 1px solid #c9a84c55;
}

/* health bars */
.health-area {
  display: flex;
  gap: 20px;
  justify-content: space-between;
  margin: 12px 10px 8px;
}
.hp-card {
  flex: 1;
  background: #0a0a18aa;
  backdrop-filter: blur(4px);
  border-radius: 28px;
  padding: 8px 16px;
  border: 1px solid #3a3a4e;
}
.hp-name {
  font-weight: bold;
  font-size: 0.85rem;
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
}
.hp-bar-bg {
  background: #1a1a2a;
  height: 12px;
  border-radius: 12px;
  margin: 5px 0;
  overflow: hidden;
}
.hp-fill {
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, #2e8b57, #4cbb6e);
  border-radius: 12px;
  transition: width 0.22s ease-out;
}
.hp-number {
  font-family: monospace;
  font-size: 0.75rem;
  font-weight: bold;
}
.p1-name { color: #77aaff; }
.p2-name { color: #ff8866; }

/* stats cards */
.stats-row {
  display: flex;
  gap: 16px;
  margin: 12px 0;
}
.stat-card {
  background: #0c0c1ccc;
  border-radius: 24px;
  padding: 8px 16px;
  flex: 1;
  border-left: 3px solid;
  backdrop-filter: blur(2px);
}
.stat-card.p1-side { border-left-color: #4488ff; }
.stat-card.p2-side { border-left-color: #dd4422; }
.stat-title {
  font-size: 0.6rem;
  color: #8a8570;
  letter-spacing: 2px;
}
.fighter-name {
  font-size: 1.1rem;
  font-weight: bold;
  margin: 2px 0;
}
.attack-def {
  display: flex;
  gap: 24px;
  margin-top: 4px;
}
.atk-val, .def-val {
  font-size: 1rem;
  font-weight: bold;
}
.defense-badge {
  font-size: 0.6rem;
  background: #22446655;
  border-radius: 20px;
  padding: 2px 8px;
  display: inline-block;
  margin-top: 5px;
}

/* action buttons */
.action-bar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin: 18px 0 12px;
}
.action-btn {
  font-family: monospace;
  font-weight: bold;
  font-size: 0.7rem;
  padding: 8px 14px;
  border-radius: 60px;
  border: none;
  cursor: pointer;
  transition: 0.08s linear;
  background: #181828;
  color: #eeddbb;
  border-bottom: 2px solid #5a5a6e;
}
.action-btn:active { transform: scale(0.96); }
.action-btn:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }
.btn-attack { background: #8b1a1a; border-bottom-color: #cc4444; }
.btn-heavy { background: #5a2a0a; border-bottom-color: #bb5522; }
.btn-quick { background: #2a4a6a; border-bottom-color: #44aaff; }
.btn-defend { background: #2a3a2a; border-bottom-color: #66aa66; }
.btn-counter { background: #6a2a4a; border-bottom-color: #cc66aa; }
.btn-special { background: #7a5a10; border-bottom-color: #eebb33; text-shadow: 0 0 2px gold; }

/* log & turn */
.info-panel {
  background: #060610bb;
  border-radius: 28px;
  padding: 8px 18px;
  margin: 10px 0 6px;
  text-align: center;
  font-family: monospace;
  font-size: 0.75rem;
}
.turn-indicator {
  font-weight: bold;
  color: #c9a84c;
}
.log-text {
  color: #cbc3aa;
  transition: 0.1s;
}
.winner-overlay {
  text-align: center;
  background: #000000aa;
  backdrop-filter: blur(8px);
  border-radius: 60px;
  padding: 8px;
  margin-bottom: 8px;
}
.winner-text {
  font-size: 1.3rem;
  font-weight: bold;
  color: #ffcc66;
}
.restart-btn {
  background: #2a5a2a;
  border: none;
  padding: 6px 20px;
  border-radius: 60px;
  font-weight: bold;
  margin-top: 6px;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="arena-title">⚔️ BATTLE ARENA ⚔️</div>
    <div class="sub">PIXEL MAYHEM · 4 LEGENDS</div>
  </div>

  <!-- fighter selection -->
  <div class="select-row" id="selectRow">
    <div class="select-panel">
      <div class="select-label">🔵 PLAYER 1</div>
      <div class="btn-group" id="p1SelectGroup"></div>
    </div>
    <div class="select-panel">
      <div class="select-label">🔴 PLAYER 2</div>
      <div class="btn-group" id="p2SelectGroup"></div>
    </div>
  </div>

  <!-- canvas (HIGH RES 4x original pixels) -->
  <div class="canvas-wrapper">
    <canvas id="battleCanvas" width="1280" height="640"></canvas>
  </div>

  <!-- health bars -->
  <div class="health-area">
    <div class="hp-card"><div class="hp-name"><span id="p1HpName">HOMELANDER</span><span id="p1HpVal">100</span></div><div class="hp-bar-bg"><div class="hp-fill" id="p1HpFill" style="width:100%"></div></div></div>
    <div class="hp-card"><div class="hp-name"><span id="p2HpName">BUTCHER</span><span id="p2HpVal">100</span></div><div class="hp-bar-bg"><div class="hp-fill" id="p2HpFill" style="width:100%"></div></div></div>
  </div>

  <!-- stat cards -->
  <div class="stats-row">
    <div class="stat-card p1-side" id="statP1"><div class="stat-title">FIGHTER</div><div class="fighter-name" id="p1StatName">Homelander</div><div class="attack-def"><span>⚔️ ATK <span id="p1AtkStat">18</span></span><span>🛡️ DEF <span id="p1DefStat">12</span></span></div><div id="p1DefBadge" class="defense-badge" style="display:none">🛡️ DEFENDING</div></div>
    <div class="stat-card p2-side" id="statP2"><div class="stat-title">FIGHTER</div><div class="fighter-name" id="p2StatName">Butcher</div><div class="attack-def"><span>⚔️ ATK <span id="p2AtkStat">16</span></span><span>🛡️ DEF <span id="p2DefStat">10</span></span></div><div id="p2DefBadge" class="defense-badge" style="display:none">🛡️ DEFENDING</div></div>
  </div>

  <!-- turn & log -->
  <div class="info-panel">
    <div><span class="turn-indicator">⚡ TURN :</span> <span id="turnName">HOMELANDER</span></div>
    <div class="log-text" id="battleLog">⚔️ Choose your champion and attack!</div>
  </div>

  <!-- actions -->
  <div class="action-bar" id="actionPanel">
    <button class="action-btn btn-attack" data-act="attack">⚔️ ATTACK</button>
    <button class="action-btn btn-heavy" data-act="heavy">💥 HEAVY</button>
    <button class="action-btn btn-quick" data-act="quick">⚡ QUICK</button>
    <button class="action-btn btn-defend" data-act="defend">🛡️ DEFEND</button>
    <button class="action-btn btn-counter" data-act="counter">🔄 COUNTER</button>
    <button class="action-btn btn-special" data-act="special">✨ SPECIAL</button>
  </div>
  <div id="winnerArea" style="text-align:center; margin-top:6px;"></div>
</div>

<script>
  // ========== FIGHTER DATA ==========
  const FIGHTERS = {
    hl: { name: "Homelander", atk: 18, def: 12, color: "#4488ff", animPrefix: "hl" },
    bb: { name: "Butcher", atk: 16, def: 10, color: "#dd4422", animPrefix: "bb" },
    gj: { name: "Gojo", atk: 22, def: 14, color: "#00ddff", animPrefix: "gj" },
    sk: { name: "Sukuna", atk: 25, def: 8, color: "#cc4400", animPrefix: "sk" }
  };
  const FIGHTER_KEYS = ['hl','bb','gj','sk'];

  // game state
  let p1Id = 'hl', p2Id = 'bb';
  let p1Hp = 100, p2Hp = 100;
  let p1Defending = false, p2Defending = false;
  let currentTurn = 1; // 1 = player1, 2 = player2
  let gameOver = false;
  let busy = false;
  let round = 1;

  // canvas & drawing (HIGH RES 4x original)
  const canvas = document.getElementById('battleCanvas');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = 1280, H = 640;      // 4x larger than classic 320x160
  const PIX = 1;                // each unit = 1px (we draw pixel by pixel but with scale)
  const GROUND_Y = 520;         // ground level

  // positions (home)
  let p1X = 240, p2X = 960;
  const P1_HOME = 240, P2_HOME = 960;
  let p1Y = GROUND_Y, p2Y = GROUND_Y;

  // animation system
  let animActive = false;
  let animTimer = 0, animPhase = 0;
  let currentAnim = null;       // object with type, attacker, damage, crit, etc.
  let pendingDamage = 0, pendingCrit = false;
  let animFrameReq = null;
  let idleReq = null;

  // effects & shake
  let shakeIntensity = 0;
  let screenFlash = 0;
  let particles = [];
  let floatingTexts = [];

  // ========== HELPER FUNCTIONS ==========
  function updateUI() {
    document.getElementById('p1HpFill').style.width = Math.max(0, p1Hp) + '%';
    document.getElementById('p2HpFill').style.width = Math.max(0, p2Hp) + '%';
    document.getElementById('p1HpVal').innerText = Math.max(0, p1Hp);
    document.getElementById('p2HpVal').innerText = Math.max(0, p2Hp);
    document.getElementById('turnName').innerText = currentTurn === 1 ? FIGHTERS[p1Id].name : FIGHTERS[p2Id].name;
    document.getElementById('p1AtkStat').innerText = FIGHTERS[p1Id].atk;
    document.getElementById('p1DefStat').innerText = FIGHTERS[p1Id].def;
    document.getElementById('p2AtkStat').innerText = FIGHTERS[p2Id].atk;
    document.getElementById('p2DefStat').innerText = FIGHTERS[p2Id].def;
    document.getElementById('p1StatName').innerText = FIGHTERS[p1Id].name;
    document.getElementById('p2StatName').innerText = FIGHTERS[p2Id].name;
    document.getElementById('p1HpName').innerText = FIGHTERS[p1Id].name.toUpperCase();
    document.getElementById('p2HpName').innerText = FIGHTERS[p2Id].name.toUpperCase();
    if(p1Defending) document.getElementById('p1DefBadge').style.display = 'inline-block';
    else document.getElementById('p1DefBadge').style.display = 'none';
    if(p2Defending) document.getElementById('p2DefBadge').style.display = 'inline-block';
    else document.getElementById('p2DefBadge').style.display = 'none';
  }

  function setLog(msg) { document.getElementById('battleLog').innerText = msg; }
  function setButtonsDisabled(disabled) {
    document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = disabled);
  }

  // camera reset (always recenter after animation)
  let cameraX = 0, cameraY = 0, targetCamX = 0, targetCamY = 0;
  function resetCamera() { targetCamX = 0; targetCamY = 0; cameraX = 0; cameraY = 0; }
  function updateCamera() { cameraX += (targetCamX - cameraX) * 0.2; cameraY += (targetCamY - cameraY) * 0.2; }
  function applyCamera() { ctx.translate(cameraX, cameraY); }

  // particles and screen shake
  function addShake(amount) { shakeIntensity = Math.max(shakeIntensity, amount); }
  function addFlash(alpha) { screenFlash = Math.min(0.8, alpha); }
  function spawnParticles(x,y,count,color,velScale=1) { for(let i=0;i<count;i++) { particles.push({ x, y, vx: (Math.random()-0.5)*3*velScale, vy: (Math.random()-0.5)*3*velScale -1, life: 12+Math.random()*8, color, size: 2+Math.random()*3 }); } }
  function spawnFloatText(x,y,text,isCrit) { floatingTexts.push({ x, y, text, life: 30, crit: isCrit }); }

  // update effects
  function updateEffects() {
    if(shakeIntensity > 0.1) shakeIntensity *= 0.85; else shakeIntensity = 0;
    if(screenFlash > 0) screenFlash *= 0.85;
    for(let i=particles.length-1;i>=0;i--) { let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--; if(p.life<=0) particles.splice(i,1); }
    for(let i=floatingTexts.length-1;i>=0;i--) { let t=floatingTexts[i]; t.life--; t.y-=1.2; if(t.life<=0) floatingTexts.splice(i,1); }
  }

  // ========== PIXEL ART DRAWING (4x scale big sprites) ==========
  function drawPixelRect(x,y,w,h,color) { ctx.fillStyle=color; ctx.fillRect(x,y,w,h); }
  function drawFighter(id, x, y, state, frame) {
    // generic placeholder but with high res block style — each fighter gets distinct color blocks (improved pixel density)
    const stats = FIGHTERS[id];
    const isDef = (state === 'defend');
    const bob = (state==='idle') ? Math.sin(frame*0.06)*1.5 : 0;
    let offY = isDef ? 8 : bob;
    let baseX = x, baseY = y + offY;
    // big chunky 60x70 pixel silhouette
    const mainColor = stats.color;
    const dark = '#222';
    const skin = (id==='hl')?'#f7c8a0':(id==='bb')?'#d6a070':(id==='gj')?'#f5e0c8':'#e0b090';
    // body
    drawPixelRect(baseX-18, baseY-32, 36, 44, dark);
    drawPixelRect(baseX-14, baseY-30, 28, 38, mainColor);
    drawPixelRect(baseX-10, baseY-28, 20, 32, '#151525');
    // head
    drawPixelRect(baseX-12, baseY-50, 24, 24, skin);
    drawPixelRect(baseX-10, baseY-48, 20, 18, '#3a2a1a');
    // eyes
    drawPixelRect(baseX-8, baseY-44, 6, 5, '#ffffff');
    drawPixelRect(baseX+2, baseY-44, 6, 5, '#ffffff');
    drawPixelRect(baseX-6, baseY-43, 4, 3, '#000000');
    drawPixelRect(baseX+4, baseY-43, 4, 3, '#000000');
    if(state === 'attack') { drawPixelRect(baseX+12, baseY-38, 20, 8, '#ffaa44'); drawPixelRect(baseX+16, baseY-42, 12, 6, '#ff8844'); }
    if(state === 'special') { drawPixelRect(baseX-4, baseY-58, 8, 8, '#ffff88'); }
    // hair/accents
    if(id==='hl') drawPixelRect(baseX-14, baseY-54, 28, 6, '#ddb820');
    if(id==='bb') drawPixelRect(baseX-14, baseY-52, 28, 4, '#1a1a1a');
    if(id==='gj') drawPixelRect(baseX-12, baseY-54, 24, 6, '#ffffff');
    if(id==='sk') { drawPixelRect(baseX-14, baseY-54, 28, 5, '#111111'); drawPixelRect(baseX-6, baseY-32, 12, 12, '#aa2222'); }
    if(isDef) drawPixelRect(baseX-22, baseY-44, 44, 32, '#88aaff33');
  }

  function drawBackground() {
    // gradient sky
    for(let i=0;i<H;i++) { let t=i/H; let r=8+Math.floor(t*8); let g=6+Math.floor(t*12); let b=24+Math.floor(t*30); ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(0,i,W,1); }
    // ground
    ctx.fillStyle='#2a2a30'; ctx.fillRect(0, GROUND_Y-8, W, 12);
    ctx.fillStyle='#4a3a2a'; ctx.fillRect(0, GROUND_Y-2, W, 6);
    for(let i=0;i<20;i++) { ctx.fillStyle='#7a6a4a'; ctx.fillRect(70+i*70, GROUND_Y-6, 12, 6); }
  }

  function drawEffectsAndShake() {
    if(screenFlash>0.02) { ctx.fillStyle=`rgba(255,255,200,${screenFlash})`; ctx.fillRect(0,0,W,H); }
    for(let p of particles) { ctx.fillStyle=p.color; ctx.fillRect(p.x-2, p.y-2, p.size, p.size); }
    for(let ft of floatingTexts) { ctx.font='bold 22px monospace'; ctx.shadowBlur=0; ctx.fillStyle=ft.crit?'#ff6666':'#ffdd88'; ctx.fillText(ft.text, ft.x-15, ft.y-ft.life*0.5); }
    ctx.shadowBlur=0;
  }

  // ========== ANIMATION SYSTEM (camera always returns) ==========
  function startAnimation(attackerIsP1, actionType, dmg, isCrit) {
    if(animActive) return;
    animActive = true;
    busy = true;
    setButtonsDisabled(true);
    pendingDamage = dmg;
    pendingCrit = isCrit;
    const attacker = attackerIsP1 ? p1Id : p2Id;
    const target = attackerIsP1 ? p2Id : p1Id;
    currentAnim = { attackerIsP1, actionType, dmg, isCrit, frame:0, phase:0, duration:30, step:0 };
    resetCamera();
    // small camera shake anticipation
    if(actionType !== 'defend') addShake(3);
    if(animFrameReq) cancelAnimationFrame(animFrameReq);
    function animateStep() {
      if(!animActive) return;
      updateCamera();
      ctx.clearRect(0,0,W,H);
      drawBackground();
      // apply camera shake
      let shakeX = (Math.random()-0.5)*shakeIntensity;
      let shakeY = (Math.random()-0.5)*shakeIntensity;
      ctx.save();
      ctx.translate(shakeX+ cameraX, shakeY+ cameraY);
      // draw fighters with dynamic states
      let p1State = 'idle', p2State = 'idle';
      if(currentAnim) {
        let prog = (currentAnim.step || 0) / 25;
        if(prog>1) prog=1;
        if(currentAnim.actionType !== 'defend') {
          if(currentAnim.attackerIsP1) { p1State = 'attack'; p2State = 'hit'; if(currentAnim.step>8) { p2X = P2_HOME + (Math.sin(currentAnim.step*1.2)*6); } else p2X = P2_HOME; }
          else { p2State = 'attack'; p1State = 'hit'; if(currentAnim.step>8) { p1X = P1_HOME - (Math.sin(currentAnim.step*1.2)*6); } else p1X = P1_HOME; }
        } else { if(currentAnim.attackerIsP1) p1State='defend'; else p2State='defend'; }
      } else { p1X = P1_HOME; p2X = P2_HOME; p1Y=GROUND_Y; p2Y=GROUND_Y; }
      drawFighter(p1Id, p1X, p1Y, p1State, performance.now()*0.01);
      drawFighter(p2Id, p2X, p2Y, p2State, performance.now()*0.01);
      drawEffectsAndShake();
      ctx.restore();
      if(currentAnim) {
        currentAnim.step = (currentAnim.step || 0) + 1;
        if(currentAnim.step >= 26) {
          // animation ends: apply damage, reset positions, clear camera
          if(currentAnim.actionType !== 'defend' && pendingDamage>0) {
            if(currentAnim.attackerIsP1) p2Hp = Math.max(0, p2Hp - pendingDamage);
            else p1Hp = Math.max(0, p1Hp - pendingDamage);
            spawnFloatText(currentAnim.attackerIsP1 ? p2X : p1X, GROUND_Y-50, `${pendingDamage}`, pendingCrit);
            addShake(5); addFlash(0.4);
            spawnParticles(currentAnim.attackerIsP1 ? p2X : p1X, GROUND_Y-30, 12, '#ffaa66',1.2);
            updateUI();
          }
          else if(currentAnim.actionType === 'defend') { setLog(`${FIGHTERS[currentAnim.attackerIsP1?p1Id:p2Id].name} defends!`); }
          // clear defend flags after action
          if(currentAnim.actionType !== 'defend') { p1Defending=false; p2Defending=false; }
          // SWITCH TURN
          currentTurn = currentTurn === 1 ? 2 : 1;
          updateUI();
          setLog(`${FIGHTERS[currentTurn===1?p1Id:p2Id].name}'s turn`);
          // check game over
          if(p1Hp <= 0 || p2Hp <= 0) { endGame(); animActive=false; busy=false; return; }
          // reset everything
          p1X = P1_HOME; p2X = P2_HOME; p1Y=GROUND_Y; p2Y=GROUND_Y;
          resetCamera(); targetCamX=0; targetCamY=0; cameraX=0; cameraY=0;
          animActive = false; busy = false;
          setButtonsDisabled(false);
          cancelAnimationFrame(animFrameReq);
          startIdleRender();
          return;
        }
      }
      animFrameReq = requestAnimationFrame(animateStep);
    }
    animateStep();
  }

  function endGame() {
    gameOver = true;
    const winner = p1Hp > 0 ? FIGHTERS[p1Id].name : FIGHTERS[p2Id].name;
    document.getElementById('winnerArea').innerHTML = `<div class="winner-overlay"><span class="winner-text">🏆 VICTORY ${winner} 🏆</span><br/><button class="restart-btn" id="restartBtn">⚔️ PLAY AGAIN ⚔️</button></div>`;
    document.getElementById('restartBtn').onclick = () => location.reload();
    setButtonsDisabled(true);
    setLog(`GAME OVER! ${winner} wins!`);
  }

  function startIdleRender() {
    if(idleReq) cancelAnimationFrame(idleReq);
    function idleDraw() {
      if(animActive || gameOver) return;
      updateCamera();
      ctx.clearRect(0,0,W,H);
      drawBackground();
      let shakeX = (Math.random()-0.5)*shakeIntensity;
      let shakeY = (Math.random()-0.5)*shakeIntensity;
      ctx.save();
      ctx.translate(shakeX + cameraX, shakeY + cameraY);
      drawFighter(p1Id, p1X, p1Y, p1Defending?'defend':'idle', performance.now()*0.008);
      drawFighter(p2Id, p2X, p2Y, p2Defending?'defend':'idle', performance.now()*0.008);
      drawEffectsAndShake();
      ctx.restore();
      updateEffects();
      idleReq = requestAnimationFrame(idleDraw);
    }
    idleDraw();
  }

  // ========== ACTION HANDLER ==========
  function performAction(action) {
    if(gameOver || busy) return;
    const attackerIsP1 = (currentTurn === 1);
    const attackerStats = FIGHTERS[attackerIsP1 ? p1Id : p2Id];
    const defenderStats = FIGHTERS[attackerIsP1 ? p2Id : p1Id];
    let dmg = 0, crit = false;
    const isDefending = attackerIsP1 ? p2Defending : p1Defending;
    let reduction = defenderStats.def + (isDefending ? Math.floor(defenderStats.def*0.5) : 0);
    if(action === 'defend') {
      if(attackerIsP1) p1Defending = true; else p2Defending = true;
      setLog(`${attackerStats.name} takes defensive stance!`);
      updateUI();
      startAnimation(attackerIsP1, 'defend', 0, false);
      return;
    }
    if(action === 'attack') dmg = attackerStats.atk + Math.floor(Math.random()*7);
    else if(action === 'heavy') dmg = Math.floor(attackerStats.atk*1.55) + Math.floor(Math.random()*8);
    else if(action === 'quick') dmg = Math.floor(attackerStats.atk*0.75) + Math.floor(Math.random()*5);
    else if(action === 'counter') dmg = Math.floor(attackerStats.atk*1.2) + Math.floor(Math.random()*9);
    else if(action === 'special') {
      if((attackerIsP1?p1Hp:p2Hp) <= 20) { setLog(`Not enough energy for special!`); return; }
      dmg = (attackerStats.atk * 1.8) + Math.floor(Math.random()*15);
    }
    if(Math.random()<0.12) { dmg = Math.floor(dmg*1.7); crit=true; }
    dmg = Math.max(2, dmg - reduction + Math.floor(Math.random()*6));
    if(isDefending && action !=='defend') { if(attackerIsP1) p2Defending=false; else p1Defending=false; updateUI(); }
    setLog(`${attackerStats.name} uses ${action.toUpperCase()}!`);
    startAnimation(attackerIsP1, action, dmg, crit);
  }

  // selection & init
  function buildSelectors() {
    const p1Div = document.getElementById('p1SelectGroup');
    const p2Div = document.getElementById('p2SelectGroup');
    FIGHTER_KEYS.forEach(key => {
      let btn1 = document.createElement('button'); btn1.innerText = FIGHTERS[key].name; btn1.className = 'fighter-btn';
      btn1.onclick = () => { if(!gameOver && !busy) { p1Id = key; updateUI(); document.querySelectorAll('#p1SelectGroup .fighter-btn').forEach(b=>b.classList.remove('active-p1')); btn1.classList.add('active-p1'); startIdleRender(); } };
      if(key==='hl') btn1.classList.add('active-p1');
      p1Div.appendChild(btn1);
      let btn2 = document.createElement('button'); btn2.innerText = FIGHTERS[key].name; btn2.className = 'fighter-btn';
      btn2.onclick = () => { if(!gameOver && !busy) { p2Id = key; updateUI(); document.querySelectorAll('#p2SelectGroup .fighter-btn').forEach(b=>b.classList.remove('active-p2')); btn2.classList.add('active-p2'); startIdleRender(); } };
      if(key==='bb') btn2.classList.add('active-p2');
      p2Div.appendChild(btn2);
    });
  }

  function bindActions() {
    document.querySelectorAll('.action-btn').forEach(btn => {
      btn.onclick = () => performAction(btn.getAttribute('data-act'));
    });
  }

  p1X=P1_HOME; p2X=P2_HOME; p1Y=GROUND_Y; p2Y=GROUND_Y;
  buildSelectors();
  bindActions();
  updateUI();
  startIdleRender();
  setLog("⚔️ Select warriors and attack! Camera always resets after each blow ⚔️");
  resetCamera();
</script>
</body>
</html>
